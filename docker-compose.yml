version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: agri-connect
    restart: always
    environment:
      MYSQL_DATABASE: agri-connect
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - "3308:3306"   # host:container
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - agri-connect-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./FarmerWabApp_backend-main/FarmerWebapp
      dockerfile: Dockerfile
    container_name: agri-connect-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/agri-connect
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
    ports:
       - "8084:8080"
    networks:
      - agri-connect-net

  frontend:
    build:
      context: ./FarmerWabApp_frontend-main/FarmerWabApp_frontend-main
      dockerfile: Dockerfile
    container_name: agri-connect-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8087:80"   # frontend runs on Nginx
    networks:
      - agri-connect-net

volumes:
  db_data:

networks:
  agri-connect-net:
    driver: bridge
