spring.application.name=FarmerWebapp

# The app inside Docker listens on 8080 (mapped to 8084 on host)
server.port=8080  

# Database connection (will be overridden by Docker env vars if provided)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/agri-connect}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

